<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DINO BA 恐龙战队 · 居家训练</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DINO BA">
<meta name="theme-color" content="#F4720B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#F4720B; --orange-2:#ff8a2b; --orange-soft:#fff1e3;
  --teal:#1ABFA0; --teal-2:#0f9d83; --teal-soft:#e3faf4;
  --bg:#f3f4f7;
  --ink:#161a20; --ink-2:#3a424e; --muted:#7c8694; --muted-2:#aab2bf;
  --card:#ffffff; --line:#edeff3; --line-2:#e0e4ea;
  --danger:#e5484d;
  --shadow-sm:0 1px 2px rgba(20,30,50,.05), 0 2px 6px rgba(20,30,50,.05);
  --shadow:0 6px 18px -6px rgba(25,40,65,.12), 0 14px 36px -14px rgba(25,40,65,.12);
  --shadow-lg:0 18px 50px -14px rgba(25,40,65,.28);
  --disp:"Plus Jakarta Sans","Noto Sans SC",sans-serif;
  --body:"Noto Sans SC","Plus Jakarta Sans",sans-serif;
  --spring:transform .2s cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--body); background:var(--bg); color:var(--ink); line-height:1.6;
  -webkit-font-smoothing:antialiased; overflow-x:hidden; position:relative; min-height:100dvh}

/* ---- soft immersive background ---- */
.bg-fx{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
.bg-fx::before{content:""; position:absolute; width:540px; height:540px; right:-170px; top:-180px; border-radius:50%;
  background:radial-gradient(circle, rgba(244,114,11,.14), transparent 65%); filter:blur(18px)}
.bg-fx::after{content:""; position:absolute; width:560px; height:560px; left:-190px; bottom:-200px; border-radius:50%;
  background:radial-gradient(circle, rgba(26,191,160,.13), transparent 65%); filter:blur(18px)}
.bg-grid{position:absolute; inset:0; opacity:.7;
  background-image:radial-gradient(circle, rgba(20,30,50,.045) 1px, transparent 1px); background-size:26px 26px;
  mask-image:radial-gradient(circle at 50% 25%, #000, transparent 78%)}
.bg-line{display:none}

#app{position:relative; z-index:1; min-height:100dvh}
.wrap{max-width:720px; margin:0 auto; padding:0 18px}
.wrap.wide{max-width:1060px}

/* ---- type ---- */
.disp{font-family:var(--disp); font-weight:800}
h1,h2,h3{font-family:var(--disp); font-weight:800; line-height:1.2; letter-spacing:-.3px; color:var(--ink)}
.kicker{font-family:var(--disp); font-weight:800; font-size:12px; letter-spacing:1.4px; text-transform:uppercase; color:var(--teal-2)}
.kicker.o{color:var(--orange)}
.link{color:var(--orange); font-weight:700; text-decoration:none}

/* ---- buttons (spring press + lift) ---- */
.btn{font-family:var(--disp); font-weight:700; font-size:15px; border:none; border-radius:14px; padding:14px 20px;
  cursor:pointer; width:100%; display:inline-flex; align-items:center; justify-content:center; gap:8px; color:#fff;
  transition:var(--spring), box-shadow .22s, background .2s, color .2s, border-color .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#ff8f33,#F4720B); box-shadow:0 8px 20px -6px rgba(244,114,11,.5)}
.btn-primary:hover{transform:translateY(-2px); box-shadow:0 14px 30px -8px rgba(244,114,11,.55)}
.btn-teal{background:linear-gradient(135deg,#2fe0bf,#1ABFA0); color:#043d33; box-shadow:0 8px 20px -6px rgba(26,191,160,.45)}
.btn-teal:hover{transform:translateY(-2px); box-shadow:0 14px 30px -8px rgba(26,191,160,.5)}
.btn-ghost{background:var(--card); color:var(--ink-2); border:1px solid var(--line-2); box-shadow:var(--shadow-sm)}
.btn-ghost:hover{border-color:var(--orange); color:var(--orange); transform:translateY(-1px)}
.btn-danger{background:#fff; color:var(--danger); border:1px solid #f4cdce; box-shadow:var(--shadow-sm)}
.btn-danger:hover{background:#fef2f2; transform:translateY(-1px)}
.btn:disabled{opacity:.45; cursor:not-allowed; transform:none; box-shadow:none}
.btn.sm{padding:9px 14px; font-size:13px; width:auto}
.btn.auto{width:auto}

/* ---- inputs ---- */
.field{margin-bottom:15px}
.field label{display:block; font-family:var(--disp); font-size:13px; font-weight:700; color:var(--ink-2); margin-bottom:7px}
input,textarea,select{width:100%; background:#fff; border:1px solid var(--line-2); border-radius:12px; padding:13px 15px;
  color:var(--ink); font-family:var(--body); font-size:15px; outline:none; box-shadow:var(--shadow-sm);
  transition:border-color .18s, box-shadow .18s}
input::placeholder,textarea::placeholder{color:var(--muted-2)}
input:focus,textarea:focus,select:focus{border-color:var(--orange); box-shadow:0 0 0 4px var(--orange-soft)}
textarea{resize:vertical; min-height:54px; line-height:1.55}

/* ---- cards ---- */
.card{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:22px; box-shadow:var(--shadow)}
.card.glow{box-shadow:var(--shadow-lg)}

/* ---- login ---- */
.center-screen{min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:34px 18px}
.login-box{width:100%; max-width:410px; text-align:center}
.logo-halo{width:120px; margin:0 auto 18px; padding:5px; background:#171c24; border-radius:22px;
  box-shadow:0 16px 38px -12px rgba(20,30,50,.45); border:1px solid rgba(255,255,255,.06)}
.logo-halo img{width:100%; display:block; border-radius:18px}
.brand-zh{font-family:var(--disp); font-weight:700; font-size:14px; letter-spacing:1.5px; color:var(--muted); margin-bottom:24px}
.brand-zh b{color:var(--teal-2); font-weight:800}
.seg{display:flex; gap:4px; background:#e9ebf0; padding:5px; border-radius:14px; margin-bottom:22px}
.seg button{flex:1; background:transparent; border:none; color:var(--muted); cursor:pointer; padding:11px;
  border-radius:10px; font-family:var(--disp); font-weight:700; font-size:14px; transition:.2s}
.seg button.on{background:#fff; color:var(--orange); box-shadow:var(--shadow-sm)}
.seg button.on.teal{color:var(--teal-2)}

/* ---- topbar ---- */
.topbar{position:sticky; top:0; z-index:30; background:rgba(255,255,255,.82); backdrop-filter:blur(16px) saturate(1.3);
  border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex; align-items:center; gap:12px; height:64px}
.topbar img{height:44px; width:44px; border-radius:12px; background:#171c24; padding:3px; box-shadow:var(--shadow-sm)}
.tb-name{font-family:var(--disp); font-weight:800; font-size:16px; color:var(--ink); line-height:1.1}
.tb-sub{font-size:12px; color:var(--muted); margin-top:2px; font-weight:600}
.spacer{flex:1}
.pill{font-family:var(--disp); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; background:var(--teal-soft); color:var(--teal-2)}

/* ---- tabs ---- */
.tabs{display:flex; gap:6px; padding:14px 0 12px; position:sticky; top:64px; z-index:20;
  background:linear-gradient(180deg,var(--bg) 72%,transparent)}
.tab{flex:1; background:#fff; border:1px solid var(--line); color:var(--muted); padding:11px 6px; border-radius:13px;
  font-family:var(--disp); font-weight:700; font-size:13px; cursor:pointer; transition:var(--spring), background .2s, color .2s, box-shadow .2s;
  text-align:center; box-shadow:var(--shadow-sm)}
.tab:hover{transform:translateY(-1px)}
.tab.on{background:linear-gradient(135deg,#ff8f33,#F4720B); color:#fff; border-color:transparent; box-shadow:0 8px 18px -8px rgba(244,114,11,.5)}

.section-pad{padding:16px 0 92px}

/* ---- chat ---- */
.chat-feed{display:flex; flex-direction:column; gap:12px; padding:6px 0}
.msg{max-width:86%; padding:13px 16px; font-size:14.5px; line-height:1.6; animation:rise .3s ease both; white-space:pre-wrap; word-break:break-word}
.msg.ai{align-self:flex-start; background:#fff; border:1px solid var(--line); box-shadow:var(--shadow-sm); border-radius:18px 18px 18px 6px}
.msg.me{align-self:flex-end; background:linear-gradient(135deg,#ff8f33,#F4720B); color:#fff; border-radius:18px 18px 6px 18px; box-shadow:0 8px 18px -8px rgba(244,114,11,.45)}
.msg.ai b,.msg.ai strong{color:var(--teal-2)}
.coach-tag{display:flex; align-items:center; gap:6px; font-family:var(--disp); font-size:12px; font-weight:800; color:var(--teal-2); margin-bottom:5px}
.dot-typing{display:inline-flex; gap:5px; padding:15px 18px; background:#fff; border:1px solid var(--line); border-radius:18px 18px 18px 6px; box-shadow:var(--shadow-sm)}
.dot-typing i{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:blink 1.2s infinite}
.dot-typing i:nth-child(2){animation-delay:.2s}.dot-typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.composer{position:sticky; bottom:0; padding:12px 0 16px; background:linear-gradient(0deg,var(--bg) 80%,transparent); display:flex; gap:9px}
.composer textarea{min-height:48px; max-height:120px; border-radius:14px}
.composer .btn{width:auto; padding:0 20px; align-self:stretch}

/* ---- today hero ---- */
.today-hero{background:linear-gradient(155deg,#ffffff 0%,#fff6ec 100%); border:1px solid var(--line); border-radius:24px;
  padding:24px; box-shadow:var(--shadow); position:relative; overflow:hidden}
.today-hero::after{content:""; position:absolute; right:-50px; top:-50px; width:180px; height:180px; border-radius:50%;
  background:radial-gradient(circle, rgba(244,114,11,.16), transparent 70%)}
.hero-top{display:flex; justify-content:space-between; align-items:center; position:relative; z-index:1}
.hero-badges{display:flex; gap:6px}
.badge{font-family:var(--disp); font-size:12px; font-weight:700; padding:5px 11px; border-radius:999px}
.badge.ok{background:var(--teal-soft); color:var(--teal-2)}
.badge.warn{background:var(--orange-soft); color:var(--orange)}
.hero-row{display:flex; align-items:center; gap:18px; margin-top:8px; position:relative; z-index:1}
.daynum{font-family:var(--disp); font-weight:800; font-size:74px; line-height:.82; letter-spacing:-3px;
  background:linear-gradient(135deg,#F4720B 25%,#1ABFA0); -webkit-background-clip:text; background-clip:text; color:transparent}
.hero-meta{display:flex; flex-direction:column; gap:9px}
.theme-tag{display:inline-block; font-family:var(--disp); font-weight:700; font-size:14px; padding:7px 14px; border-radius:999px;
  background:var(--teal-soft); color:var(--teal-2); width:fit-content}
.time-est{font-family:var(--disp); font-weight:700; font-size:14px; color:var(--orange); display:inline-flex; align-items:center; gap:5px}
.time-est::before{content:"⏱"}
.time-pick{margin-top:20px; padding-top:18px; border-top:1px solid var(--line); position:relative; z-index:1}
.tp-label{font-size:13px; color:var(--muted); margin-bottom:11px; font-weight:600}
.chips{display:flex; gap:8px; flex-wrap:wrap}
.chip{font-family:var(--disp); font-weight:700; font-size:13px; padding:9px 14px; border-radius:999px; border:1px solid var(--line-2);
  background:#fff; color:var(--ink-2); cursor:pointer; box-shadow:var(--shadow-sm);
  transition:var(--spring), border-color .16s, color .16s, box-shadow .2s}
.chip:hover{border-color:var(--orange); color:var(--orange); transform:translateY(-2px)}
.chip.on{background:linear-gradient(135deg,#ff8f33,#F4720B); color:#fff; border-color:transparent; box-shadow:0 8px 18px -8px rgba(244,114,11,.55)}

/* ---- exercise cards ---- */
.ex{background:#fff; border:1px solid var(--line); border-radius:18px; padding:18px; margin-bottom:12px;
  box-shadow:var(--shadow-sm); transition:transform .2s, box-shadow .25s; animation:rise .4s ease both}
.ex:hover{transform:translateY(-3px); box-shadow:var(--shadow)}
.ex-head{display:flex; align-items:center; gap:11px; margin-bottom:9px}
.ex-idx{flex:none; width:30px;height:30px;border-radius:10px; display:grid;place-items:center; font-family:var(--disp); font-weight:800; font-size:14px; background:var(--orange-soft); color:var(--orange)}
.ex-name{font-family:var(--disp); font-weight:700; font-size:16.5px; color:var(--ink)}
.ex-sets{font-family:var(--disp); font-weight:700; font-size:13px; color:var(--teal-2); margin-left:auto; white-space:nowrap; background:var(--teal-soft); padding:5px 11px; border-radius:999px}
.ex-desc{font-size:14.5px; color:var(--ink-2); line-height:1.65; margin-bottom:8px}
.ex-cue{font-size:13.5px; color:var(--muted); display:flex; gap:8px; margin-top:5px; align-items:baseline}
.ex-cue b{color:var(--orange); font-weight:700; flex:none; font-size:12px; background:var(--orange-soft); padding:2px 9px; border-radius:7px}
.ex-foot{display:flex; align-items:center; gap:8px; margin-top:13px}
.focus-chip{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-family:var(--disp); font-weight:600; padding:4px 11px; border-radius:999px; background:#f3f5f8; color:var(--ink-2)}
.focus-chip::before{content:""; width:7px; height:7px; border-radius:50%; background:var(--fc,#1ABFA0)}
.ex-min{font-size:12px; font-family:var(--disp); font-weight:700; color:var(--muted); margin-left:auto}

/* ---- progress ring + grid ---- */
.ring-wrap{display:flex; justify-content:center; margin-bottom:22px}
.ring{width:158px;height:158px;border-radius:50%; background:conic-gradient(var(--teal) calc(var(--p)*1%), #e7eaf0 0);
  display:grid; place-items:center; box-shadow:var(--shadow); animation:ringpop .6s cubic-bezier(.34,1.56,.64,1) both}
.ring-in{width:124px;height:124px;border-radius:50%; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:inset 0 2px 10px rgba(20,30,50,.06)}
.ring-v{font-family:var(--disp); font-weight:800; font-size:33px; line-height:1; background:linear-gradient(135deg,#F4720B,#1ABFA0); -webkit-background-clip:text; background-clip:text; color:transparent}
.ring-l{font-size:12px; color:var(--muted); font-weight:600; margin-top:3px}
@keyframes ringpop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.grid30{display:grid; grid-template-columns:repeat(6,1fr); gap:9px}
.cell{aspect-ratio:1; border-radius:14px; border:1px solid var(--line-2); background:#fff; box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; font-family:var(--disp); font-weight:800; color:var(--muted);
  transition:transform .16s, box-shadow .2s}
.cell .n{font-size:15px} .cell .s{font-size:8.5px; font-weight:600; color:var(--muted-2); margin-top:1px; max-width:88%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.cell.done{background:linear-gradient(135deg,#e9fbf5,#d2f4ec); border-color:transparent; color:var(--teal-2)}
.cell.today{border:2px solid var(--orange); color:var(--orange); box-shadow:0 8px 18px -8px rgba(244,114,11,.4)}
.cell.locked{opacity:.5}
.cell:hover{transform:translateY(-3px); box-shadow:var(--shadow)}

/* ---- stats ---- */
.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px}
.stat{background:#fff; border:1px solid var(--line); border-radius:18px; padding:18px 10px; text-align:center; box-shadow:var(--shadow-sm)}
.stat .v{font-family:var(--disp); font-weight:800; font-size:30px; color:var(--ink); line-height:1}
.stat .l{font-size:12px; color:var(--muted); margin-top:6px; font-weight:600}
.progressbar{height:8px; background:#e7eaf0; border-radius:999px; overflow:hidden}
.progressbar > i{display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,#1ABFA0,#F4720B); transition:width .6s ease}

/* ---- coach admin ---- */
.stu-row{display:flex; align-items:center; gap:13px; padding:15px; border:1px solid var(--line); border-radius:18px; background:#fff;
  margin-bottom:11px; cursor:pointer; box-shadow:var(--shadow-sm); transition:transform .18s, box-shadow .2s, border-color .18s}
.stu-row:hover{transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--orange)}
.avatar{flex:none; width:46px;height:46px;border-radius:14px; display:grid;place-items:center; font-family:var(--disp); font-weight:800; font-size:17px; color:#fff; background:linear-gradient(135deg,#ff8f33,#1ABFA0)}
.tag{display:inline-block; font-size:11.5px; font-weight:600; padding:3px 10px; border-radius:999px; margin:2px 5px 2px 0; background:#f0f2f6; color:var(--muted)}
.tag.w{background:var(--orange-soft); color:var(--orange)}

/* ---- modal / toast / loader ---- */
.modal-bg{position:fixed; inset:0; z-index:100; background:rgba(20,28,45,.45); backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; padding:20px; animation:fade .2s}
.modal{width:100%; max-width:440px; max-height:88dvh; overflow:auto; background:#fff; border-radius:24px; padding:24px;
  box-shadow:var(--shadow-lg); animation:rise .32s cubic-bezier(.34,1.56,.64,1) both}
.toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%); z-index:200; background:#fff; color:var(--ink);
  padding:13px 20px; border-radius:14px; font-size:14px; font-weight:600; box-shadow:var(--shadow-lg); border:1px solid var(--line);
  animation:rise .3s ease both; max-width:90vw; text-align:center}
.toast.ok{border-left:4px solid var(--teal)} .toast.err{border-left:4px solid var(--danger)}
.loader-ring{width:46px;height:46px;border-radius:50%;border:4px solid var(--line-2); border-top-color:var(--orange); margin:6px auto 4px; animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none !important}
.muted{color:var(--muted)} .small{font-size:13px; line-height:1.6}
.hr{height:1px; background:var(--line); margin:18px 0}
.row{display:flex; gap:10px} .row > *{flex:1}
.empty{text-align:center; padding:50px 20px; color:var(--muted)}
.empty .big{font-size:48px}

@keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.fade-in{animation:rise .4s ease both}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#d6dbe3; border-radius:999px}
::-webkit-scrollbar-track{background:transparent}
::selection{background:var(--orange-soft)}
</style>
</head>
<body>
<div class="bg-fx"><div class="bg-grid"></div><div class="bg-line a"></div><div class="bg-line b"></div></div>
<div id="app"></div>

<script>
/* =========================================================================

    const res=await fetch('/api/db',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action,data:data||{}})});
    if(!res.ok){ console.warn('DB error',res.status); return null; }
    return res.json();
  }catch(e){ console.warn('DB call error:',e); return null; }
}
async function saveStudentToSupabase(username){
  const s=DB.students[username]; if(!s) return;
  const row={username,name:s.name,password:s.password,phone:s.phone||"",onboarded:!!s.onboarded,
    profile:s.profile||{},plan:s.plan||null,progress:s.progress||{},
    overrides:s.overrides||{},chat:(s.chat||[]).slice(-30)};
  dbCall('saveStudent',row); // fire and forget
}
async function deleteStudentFromSupabase(username){
  dbCall('deleteStudent',{username});
}
async function saveCoachPasswordToSupabase(pwd){
  dbCall('saveCoachPassword',{value:pwd});
}
async function loadAllFromSupabase(){
  const result=await dbCall('loadAll');
  if(!result) return;
  const {students,settings}=result;
  if(students&&students.length){
    students.forEach(r=>{
      DB.students[r.username]={
        name:r.name,password:r.password,phone:r.phone||"",onboarded:r.onboarded,
        profile:r.profile||{},plan:r.plan||null,progress:r.progress||{},
        overrides:r.overrides||{},chat:r.chat||[],
        createdAt:r.created_at?new Date(r.created_at).getTime():Date.now()
      };
    });
  }
  if(settings&&settings.length) DB.coachPassword=settings[0].value;
  localStorage.setItem(DB_KEY,JSON.stringify(DB));
}

/* ---------- Claude API ---------- */
async function callClaude(messages, system, maxTokens){
  const s = DB.settings || {};
  const useCustom = s.apiUrl && s.apiUrl.trim();
  const url = useCustom ? s.apiUrl.trim() : "/api/claude";
  const headers = {"Content-Type":"application/json"};
  if(useCustom && s.apiKey && s.apiKey.trim()){
    headers["x-api-key"] = s.apiKey.trim();
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const body = { model:MODEL, max_tokens:maxTokens||1500, messages };
  if(system) body.system = system;
  const res = await fetch(url, {method:"POST", headers, body:JSON.stringify(body)});
  if(!res.ok){
    let t=""; try{t=await res.text();}catch(e){}
    throw new Error("API "+res.status+" "+t.slice(0,160));
  }
  // SSE streaming (Vercel proxy) or plain JSON (custom endpoint)
  const ct = res.headers.get("content-type")||"";
  if(ct.includes("text/event-stream")){
    const reader=res.body.getReader(); const dec=new TextDecoder();
    let text="", buf="";
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n"); buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith("data: ")) continue;
        const d=line.slice(6).trim(); if(d==="[DONE]") break;
        try{
          const evt=JSON.parse(d);
          if(evt.type==="content_block_delta"&&evt.delta?.type==="text_delta") text+=evt.delta.text;
        }catch(e){}
      }
    }
    return text.trim();
  }
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}
function extractJSON(text){
  let t = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const a = t.indexOf("{"), b = t.lastIndexOf("}");
  if(a>=0 && b>a) t = t.slice(a,b+1);
  return JSON.parse(t);
}

/* ---- plan generation ---- */
const PLAN_SYS = `你是 DINO BA 恐龙战队的 恐龙教练（羽毛球居家训练教练）。根据与学员的对话，为他生成一份个性化的 30 天居家训练计划。

只输出一个 JSON 对象，不要任何解释、不要 markdown 代码块。结构如下：
{
 "summary": "一句话总结学员情况（中文，给教练看）",
 "profile": {
   "weaknesses": ["footwork"],
   "equipment": ["球拍","跳绳"],
   "dailyMinutes": 30,
   "fitness": "新手"
 },
 "library": [
   {"id":"E1","name":"米字步法","focus":"footwork","desc":"在地上想象米字，按顺序快速移动到各个点再回中心。","cue":"重心放低，回中要快"}
 ],
 "days": [
   {"d":1,"theme":"基础脚步唤醒","items":[{"id":"E1","sets":"3组 × 30秒（组间休息30秒）","min":8,"note":""}]}
 ]
}

【时长是最重要的要求，务必做到】
- 每天所有动作的 min 之和必须等于（或极接近）学员的 dailyMinutes。生成每一天后都要把各动作 min 相加自检：若总和不足 dailyMinutes，就增加动作数量 / 增加组数 / 延长时长 / 加入更长的热身和放松，直到填满目标时间。绝不能让任何一天的总时长少于 dailyMinutes。
- min = 该动作（含组间休息）的预计分钟数，整数；同一天所有 min 相加 ≈ dailyMinutes。
- 用 dailyMinutes 决定训练量：20 分钟≈3-4 个动作；30 分钟≈4-5 个；45 分钟≈6-7 个；60 分钟≈7-9 个；90 分钟≈9-11 个。每天都包含热身和放松/拉伸。

其他要求：
- focus 只能用: footwork, swing, endurance, strength, recovery
- 计划循序渐进：前期打基础，中期加量，后期接近实战，每 7 天左右安排一天恢复/放松(recovery)日（recovery 日时长可略短）。
- 按学员弱点分配更多相关训练；只用学员现有器材（没有的不要用）。
- desc 具体可执行但简短(一两句)，cue 一句话要点；sets 必须写清组数/次数或时长，并明确写出组间休息时间（例如『4 组 × 12 次，组间休息 30 秒』；热身/跳绳等连续动作写时长并注明是否需要休息）。
- days 必须正好 30 天，items 引用 library 的 id。全部用中文。务必只输出 JSON。`;

async function generatePlan(){
  const ov = modal(`
    <div style="text-align:center;padding:14px 4px">
      <div class="loader-ring"></div>
      <h3 style="margin:14px 0 6px">恐龙教练正在制定你的计划…</h3>
      <p class="muted small">分析你的弱点、器材和体能，定制 30 天路线 🦖</p>
    </div>`);
  const msgs = onboardMsgs.concat([{role:"user",content:"好了，请根据以上对话，现在生成我的 30 天计划，只输出 JSON。"}]);
  try{
    const raw = await callClaude(msgs, PLAN_SYS, 12000);
    const plan = extractJSON(raw);
    if(!plan.days || !plan.days.length) throw new Error("计划格式不完整");
    const s = stu();
    s.plan = plan; s.profile = plan.profile || {}; s.onboarded = true;
    s.progress = {}; s.overrides = {};
    saveDB(); ov.remove(); route();
    toast("计划生成完成，开练吧！💪","ok");
  }catch(e){
    ov.remove();
    modal(`<h3 style="margin-bottom:8px">生成失败 😣</h3>
      <p class="muted small" style="margin-bottom:16px">${esc((e.message||"").slice(0,140))}<br><br>可能是网络或回复被截断了。再试一次通常就好；如果你是自己部署的版本，记得在设置填好 API。</p>
      <button class="btn btn-primary" onclick="this.closest('.modal-bg').remove();generatePlan()">再试一次</button>
      <div style="height:8px"></div>
      <button class="btn btn-ghost" onclick="this.closest('.modal-bg').remove()">取消</button>`);
  }
}

function dayData(s, d){
  const dm = (s.profile&&s.profile.dailyMinutes)||null;
  if(s.overrides && s.overrides[d]){
    const o=s.overrides[d];
    let items=o.items.map(it=>({name:it.name,sets:it.sets,desc:it.desc,cue:it.cue,focus:it.focus,min:it.min}));
    fillMinutes(items, o.targetMin||dm);
    return {theme:o.theme, items, rescued:true, targetMin:o.targetMin, kind:o.kind};
  }
  const day = (s.plan.days||[]).find(x=>x.d===d) || (s.plan.days||[])[d-1];
  if(!day) return null;
  const lib = {}; (s.plan.library||[]).forEach(e=>lib[e.id]=e);
  let items = (day.items||[]).map(it=>{
    const e = lib[it.id] || {name:it.name||"动作",desc:it.desc||"",cue:it.cue||"",focus:it.focus||"footwork"};
    return {name:e.name, desc:e.desc, cue:e.cue, focus:e.focus, sets:it.sets||"", note:it.note||"", min:it.min};
  });
  fillMinutes(items, dm);

function dayTotalMin(items){ let t=0,has=false; (items||[]).forEach(x=>{ const n=Number(x.min); if(n>0){t+=n;has=true;} }); return has?Math.round(t):null; }

function fillMinutes(items, target){
  // Force the day's minutes to add up to the selected/target time.
  if(!items||!items.length) return items;
  const T = Number(target)>0 ? Math.round(Number(target)) : 0;
  const provided = items.map(x=> Number(x.min)>0 ? Number(x.min) : 0);
  const anyProvided = provided.some(v=>v>0);
  // base weights: use AI minutes as proportions; fill blanks with the provided average
  let weights;
  if(anyProvided){
    const vals=provided.filter(v=>v>0);
    const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
    weights=provided.map(v=> v>0 ? v : Math.max(3,Math.round(avg)));
  } else {
    weights=items.map(()=>1);
  }
  if(!T){ // no known target: just ensure every item has some minute value
    items.forEach((x,i)=>{ if(!(Number(x.min)>0)) x.min = anyProvided ? weights[i] : 6; });
    return items;
  }
  const sumW = weights.reduce((a,b)=>a+b,0) || items.length;
  let mins = weights.map(w=> Math.max(2, Math.round(w/sumW*T)));
  let diff = T - mins.reduce((a,b)=>a+b,0);   // fix rounding so the sum is EXACTLY T
  if(diff!==0){
    let idx=0; for(let i=1;i<mins.length;i++){ if(mins[i]>mins[idx]) idx=i; }
    mins[idx]=Math.max(2, mins[idx]+diff);
  }
  items.forEach((x,i)=>{ x.min = mins[i]; });
  return items;
}

// estimate one exercise's minutes from its sets text (組数/时长/次数 + 休息)
function parseSetMin(sets){
  const t=String(sets||""); let n=1;
  const sm=t.match(/(\d+)\s*组/); if(sm) n=+sm[1];
  let perSec=0, found=false;
  const dm=t.match(/(\d+)\s*分钟/); if(dm){ perSec=+dm[1]*60; found=true; }
  const ss=t.match(/(\d+)\s*秒/); if(ss){ perSec=+ss[1]; found=true; }
  if(!found){ const rm=t.match(/(\d+)\s*(次|下|个)/); if(rm){ perSec=+rm[1]*2.5; found=true; } }
  let rest=0; const r1=t.match(/休息\s*(\d+)\s*秒/); if(r1) rest=+r1[1]; const r2=t.match(/休息\s*(\d+)\s*分/); if(r2) rest=+r2[1]*60;
  if(!found) return null;
  return Math.max(1, Math.round((n*perSec + n*rest)/60));
}
// guarantee every item has a numeric .min; total ≈ target
function fillMinutes(items, target){
  const arr=(items||[]).map(it=>Object.assign({}, it));
  arr.forEach(it=>{ let m=Number(it.min); if(!(m>0)){ const p=parseSetMin(it.sets); m=(p>0?p:0); } it.min=m; });
  const zeros=arr.filter(it=>!(it.min>0));
  if(zeros.length){
    const known=arr.reduce((a,it)=>a+(it.min>0?it.min:0),0);
    const rem=Math.max(zeros.length, (Number(target)||0)-known);
    const each=Math.max(1, Math.round(rem/zeros.length));
    zeros.forEach(it=>{ it.min=each; });
  }
  const total=arr.reduce((a,it)=>a+(it.min>0?it.min:0),0);
  return {items:arr, total};
}

    DB.settings.apiUrl=($("cfg-url").value||"").trim();
    DB.settings.apiKey=($("cfg-key").value||"").trim();
    saveDB(); toast("API 设置已保存","ok");
  };
}

/* =========================================================================
   COACH ADMIN
   ========================================================================= */
let coachView = {mode:"list", student:null};
function renderCoach(){
  app.innerHTML=`
  <div class="topbar"><div class="wrap wide">
    <img src="${LOGO}">
    <div><div class="tb-name">教练后台</div><div class="tb-sub">DINO BA 恐龙战队</div></div>
    <div class="spacer"></div>
    <button class="btn btn-ghost sm" onclick="logout()">退出</button>
  </div></div>
  <div class="wrap wide section-pad" id="coach-body"></div>`;
  if(coachView.mode==="detail" && DB.students[coachView.student]) renderCoachDetail();
  else { coachView.mode="list"; renderCoachList(); }
  // Silently refresh all student data from Supabase in background
  {
    loadAllFromSupabase().then(()=>{
      if($("coach-body")){
        if(coachView.mode==="detail"&&DB.students[coachView.student]) renderCoachDetail();
        else renderCoachList();
      }
    }).catch(()=>{});
  }
}
function renderCoachList(){
  const body=$("coach-body");
  const keys=Object.keys(DB.students);
  const total=keys.length;
  const active=keys.filter(k=>DB.students[k].onboarded).length;
  const totalDone=keys.reduce((a,k)=>a+completedCount(DB.students[k]),0);
  body.innerHTML=`
  <div class="fade-in" style="padding-top:18px">
    <div class="stats">
      <div class="stat"><div class="v">${total}</div><div class="l">学员总数</div></div>
      <div class="stat"><div class="v">${active}</div><div class="l">已开始训练</div></div>
      <div class="stat"><div class="v">${totalDone}</div><div class="l">总完成次数</div></div>
    </div>
    <div class="row" style="margin-bottom:18px">
      <button class="btn btn-primary" id="c-add">+ 新增学员</button>
      <button class="btn btn-ghost" id="c-set">⚙ 后台设置</button>
    </div>
    <div class="kicker o" style="margin-bottom:10px">学员名单</div>
    <div id="stu-list"></div>
  </div>`;
  $("c-add").onclick=addStudentModal;
  $("c-set").onclick=coachSettingsModal;
  const list=$("stu-list");
  if(!keys.length){ list.innerHTML=`<div class="empty"><div class="big">🦖</div><p>还没有学员。点「新增学员」开始建立你的战队。</p></div>`; return; }
  keys.sort((a,b)=>DB.students[a].createdAt-DB.students[b].createdAt).forEach(k=>{
    const s=DB.students[k]; const done=completedCount(s); const pct=Math.round(done/30*100);
    const ws=(s.profile&&s.profile.weaknesses||[]).map(w=>`<span class="tag w">${esc((FOCUS[w]||{zh:w}).zh)}</span>`).join("")||'<span class="tag">未评估</span>';
    const row=document.createElement("div"); row.className="stu-row";
    row.innerHTML=`
      <div class="avatar">${esc(initials(s.name))}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--disp);font-weight:700;font-size:16px">${esc(s.name)} ${s.phone?'<span style="font-size:12px;color:var(--muted);font-weight:400">'+esc(s.phone)+'</span>':''}</div>
        <div style="margin:3px 0 5px">${ws}</div>
        <div class="progressbar"><i style="width:${pct}%"></i></div>
      </div>
      <div style="text-align:right;flex:none">
        <div style="font-family:var(--disp);font-weight:700;font-size:18px;color:var(--teal)">${done}/30</div>
        <div class="muted small">${s.onboarded?'训练中':'待评估'}</div>
      </div>`;
    row.onclick=()=>{ coachView={mode:"detail",student:k}; renderCoach(); };
    list.appendChild(row);
  });
}
function renderCoachDetail(){
  const k=coachView.student; const s=DB.students[k];
  const body=$("coach-body"); const done=completedCount(s); const cur=currentDay(s);
  const prof=s.profile||{};
  const ws=(prof.weaknesses||[]).map(w=>`<span class="tag w">${esc((FOCUS[w]||{zh:w}).zh)}</span>`).join("")||'—';
  const eq=(prof.equipment||[]).map(e=>`<span class="tag">${esc(e)}</span>`).join("")||'—';
  body.innerHTML=`
  <div class="fade-in" style="padding-top:18px">
    <button class="btn btn-ghost sm auto" onclick="coachView={mode:'list'};renderCoach()" style="margin-bottom:16px">← 返回名单</button>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;gap:14px;align-items:center">
        <div class="avatar" style="width:54px;height:54px;font-size:22px">${esc(initials(s.name))}</div>
        <div><h2 style="font-size:22px">${esc(s.name)}</h2>
        <div class="muted small">${s.onboarded?`训练中 · 第 ${cur>30?30:cur}/30 天`:'尚未完成入队评估'}</div></div>
      </div>
      <div class="hr"></div>
      <div class="small" style="line-height:2">
        <div><span class="muted">电话：</span>${esc(s.phone||'—')}</div>
        <div><span class="muted">弱点：</span>${ws}</div>
        <div><span class="muted">器材：</span>${eq}</div>
        <div><span class="muted">每天时间：</span>${prof.dailyMinutes?esc(prof.dailyMinutes)+' 分钟':'—'} &nbsp; <span class="muted">体能：</span>${esc(prof.fitness||'—')}</div>
      </div>
      ${s.plan&&s.plan.summary?`<div class="hr"></div><div class="small"><span class="muted">恐龙教练评估：</span>${esc(s.plan.summary)}</div>`:''}
    </div>
    ${s.onboarded?`<div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="kicker o">训练进度 ${done}/30</div>
        <div style="font-family:var(--disp);font-weight:700;color:var(--teal)">${Math.round(done/30*100)}%</div>
      </div>
      <div class="grid30" id="c-grid"></div>
    </div>`:''}
    <div class="row">
      <button class="btn btn-danger" id="c-del">删除学员</button>
      <button class="btn btn-ghost" id="c-resetpass">重设密码</button>
    </div>
  </div>`;
  if(s.onboarded){
    const g=$("c-grid");
    for(let d=1;d<=30;d++){
      const isDone=!!(s.progress&&s.progress[d]); const isToday=d===cur;
      const c=document.createElement("div");
      c.className="cell "+(isDone?"done ":"")+(isToday?"today ":"")+(d>cur?"locked":"");
      c.style.cursor="default";
      c.innerHTML=`<div class="n">${d}</div><div class="s">${isDone?'✓':''}</div>`;
      g.appendChild(c);
    }
  }
  $("c-del").onclick=()=>{
    confirmModal(`确定删除学员「${s.name}」？所有计划和进度都会消失，无法恢复。`, ()=>{
      delete DB.students[k]; saveDB(); deleteStudentFromSupabase(k); coachView={mode:"list"}; renderCoach(); toast("已删除","ok");
    }, {title:"删除学员", yes:"删除", danger:true});
  };
  $("c-resetpass").onclick=()=>{
    promptModal("给 "+s.name+" 设定新密码", (np)=>{ s.password=np; saveDB(k); toast("密码已重设","ok"); }, {title:"重设密码", password:true, placeholder:"新密码"});
  };
}
function addStudentModal(){
  const m=modal(`
    <h3 style="margin-bottom:14px">新增学员</h3>
    <div class="field"><label>名字</label><input id="as-name" placeholder="学员名字"></div>
    <div class="field"><label>初始密码</label><input id="as-pass" placeholder="给学员的登录密码"></div>
    <p class="muted small" style="margin-bottom:14px">学员首次用名字+密码登录后，恐龙教练会带他完成入队评估。</p>
    <button class="btn btn-primary" id="as-go">创建</button>
    <div style="height:8px"></div>
    <button class="btn btn-ghost" onclick="this.closest('.modal-bg').remove()">取消</button>`);
  $("as-go").onclick=()=>{
    const name=($("as-name").value||"").trim(); const pass=($("as-pass").value||"").trim();
    if(!name||!pass){toast("请填名字和密码","err");return;}
    const key=name.toLowerCase();
    if(DB.students[key]){toast("已有同名学员","err");return;}
    DB.students[key]={name,password:pass,onboarded:false,profile:null,plan:null,progress:{},overrides:{},chat:[],createdAt:Date.now()};
    saveDB(key); m.remove(); renderCoachList(); toast("学员已创建","ok");
  };
}
function coachSettingsModal(){
  const m=modal(`
    <h3 style="margin-bottom:14px">后台设置</h3>
    <div class="field"><label>修改教练密码</label><input id="cs-pass" type="password" placeholder="新教练密码"></div>
    <button class="btn btn-teal auto" id="cs-save" style="margin-bottom:18px">保存密码</button>
    <div class="hr"></div>
    ${apiConfigCard()}
    <div style="height:10px"></div>
    <button class="btn btn-ghost" onclick="this.closest('.modal-bg').remove()">关闭</button>`);
  $("cs-save").onclick=()=>{
    const p=($("cs-pass").value||"").trim(); if(!p){toast("请输入新密码","err");return;}
    DB.coachPassword=p; saveDB(); saveCoachPasswordToSupabase(p); toast("教练密码已更新","ok");
  };
  bindApiConfig();
}

/* =========================================================================
   BOOT
   ========================================================================= */
(async function boot(){
  app.innerHTML=`<div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
    <div class="loader-ring" style="width:52px;height:52px;border-width:5px"></div>
    <p style="color:var(--muted);font-size:14px;font-family:var(--disp);font-weight:600">DINO BA 加载中…</p>
  </div>`;
  try{ await loadAllFromSupabase(); }
  catch(e){ console.warn('Load failed, using local cache:',e); }
  try{ const ss=sessionStorage.getItem("dinoba_session"); if(ss) session=ss; }catch(e){}
  route();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
})();
</script>
</body>
